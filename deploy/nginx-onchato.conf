# nginx site config — onchato.com
# Skopiuj do: /etc/nginx/sites-available/onchato
# Aktywuj:    sudo ln -s /etc/nginx/sites-available/onchato /etc/nginx/sites-enabled/
# TLS:        sudo certbot --nginx -d onchato.com

server {
    listen 80;
    server_name onchato.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name onchato.com;

    # TLS — uzupełniane automatycznie przez certbot
    # ssl_certificate     /etc/letsencrypt/live/onchato.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/onchato.com/privkey.pem;

    # Wymagane przez WebRTC w przeglądarce (SharedArrayBuffer)
    add_header Cross-Origin-Opener-Policy  "same-origin";
    add_header Cross-Origin-Embedder-Policy "require-corp";

    # Frontend — pliki statyczne z dist/
    root /var/www/onchato;
    index index.html;

    # WebSocket proxy → relay Node.js
    # Multiaddr przeglądarki: /dns4/onchato.com/tcp/443/wss/http-path/%2Frelay/p2p/<PEERID>
    location /relay {
        proxy_pass         http://127.0.0.1:9001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # SPA fallback — wszystkie inne żądania → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
