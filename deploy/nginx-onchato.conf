# nginx site config — onchato.com + bs1.onchato.com
# Skopiuj do: /etc/nginx/sites-available/onchato.com
# Aktywuj:    sudo ln -s /etc/nginx/sites-available/onchato.com /etc/nginx/sites-enabled/

# --- HTTP redirect: onchato.com ---
server {
    listen 80;
    server_name onchato.com;
    return 301 https://$host$request_uri;
}

# --- HTTPS: onchato.com — frontend statyczny ---
server {
    listen 443 ssl;
    server_name onchato.com;

    ssl_certificate     /etc/letsencrypt/live/onchato.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/onchato.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Wymagane przez WebRTC w przeglądarce (SharedArrayBuffer)
    add_header Cross-Origin-Opener-Policy   "same-origin";
    add_header Cross-Origin-Embedder-Policy "require-corp";

    root  /var/www/onchato;
    index index.html;

    # SPA fallback — wszystkie inne żądania → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}

# --- HTTP redirect: bs1.onchato.com ---
server {
    listen 80;
    server_name bs1.onchato.com;
    return 301 https://$host$request_uri;
}

# --- HTTPS: bs1.onchato.com — libp2p relay ---
# Multiaddr przeglądarki: /dns4/bs1.onchato.com/tcp/443/wss/http-path/%2Frelay/p2p/<PEERID>
server {
    listen 443 ssl;
    server_name bs1.onchato.com;

    ssl_certificate     /etc/letsencrypt/live/bs1.onchato.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bs1.onchato.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # WebSocket relay — bez COOP/COEP, to nie przeglądarka
    location /relay {
        # ── AUTH (opcjonalne) ────────────────────────────────────────────────
        # Nie chcesz auth: zostaw poniższe zakomentowane.
        # Chcesz auth:    odkomentuj obie linijki i podstaw mikroserwis
        #                 pod http://127.0.0.1:9002 (src/auth-server.mjs).
        #
        # auth_request      /auth-check;
        # auth_request_set  $auth_status $upstream_status;
        # ────────────────────────────────────────────────────────────────────

        proxy_pass         http://127.0.0.1:9001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Subrequest auth — wewnętrzny, niedostępny z zewnątrz
    # Używany przez auth_request powyżej gdy auth jest włączone.
    location = /auth-check {
        internal;
        proxy_pass              http://127.0.0.1:9002/check;
        proxy_pass_request_body off;
        proxy_set_header        Content-Length "";
        proxy_set_header        X-Original-URI $request_uri;
        proxy_set_header        Authorization $http_authorization;
    }

    # health check
    location /health {
        return 200 "bs1 ok\n";
        add_header Content-Type text/plain;
    }
}
